name: e2e

# Fully hermetic end-to-end suite against a throwaway Docker Compose Forgejo
# stack. Needs NO secrets — Forgejo is self-hostable, so CI stands one up, mints
# an admin token, and the suite provisions + tears down its own org. Runs on push
# to main, nightly, and on demand (kept off PRs to keep PR CI fast).
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci

      - name: bring up Forgejo + mint token
        run: bash e2e/bootstrap.sh

      - name: run e2e (with apply phase)
        env:
          FORGEJO_E2E_APPLY: '1'
        run: npm run test:e2e:run

      - name: tear down
        if: always()
        run: docker compose -f e2e/docker-compose.yml down -v
